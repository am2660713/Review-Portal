<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Self Review Form</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="hero card">
      <p class="tag">Manager Self Review</p>
      <h1 id="selfTitle">My Self Review Form</h1>
      <p>Complete all compulsory points for your own assigned review.</p>
      <button id="backBtn" class="secondary">Back to Manager Page</button>
      <button id="logoutBtn" class="secondary">Logout</button>
    </section>

    <section class="card">
      <h2>Self Review Form</h2>
      <form id="selfReviewForm">
        <label>Assignment ID<input id="assignmentId" type="number" required readonly /></label>
        <div class="grid three">
          <label>Innovation<select id="innovation" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Goal Achievement<select id="goalAchievement" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Team Work<select id="teamWork" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Commitment<select id="commitment" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Technical Learning<select id="technicalLearning" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Software Support<select id="softwareSupport" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Graphics Learning<select id="graphicsLearning" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Site Activities<select id="siteActivitiesRating" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Communication<select id="communication" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Problem Solving<select id="problemSolving" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Time Management<select id="timeManagement" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
          <label>Overall Rating<select id="overallRating" required><option value="">Select</option><option value="1">*.... (1)</option><option value="2">**... (2)</option><option value="3">***.. (3)</option><option value="4">****. (4)</option><option value="5">***** (5)</option></select></label>
        </div>
        <label>Software / Hardware Skills Learned<textarea id="skillsLearned" rows="3" required></textarea></label>
        <label>Programming and Development Work<textarea id="softwareHardware" rows="3" required></textarea></label>
        <label>Graphics Software Learned<textarea id="graphicsSkills" rows="3" required></textarea></label>
        <label>Site Activities<textarea id="siteActivities" rows="3" required></textarea></label>
        <label>Key Achievements<textarea id="achievements" rows="3" required></textarea></label>
        <label>Challenges / Improvement Areas<textarea id="challenges" rows="3" required></textarea></label>
        <label>Self Comments<textarea id="selfComments" rows="4" required></textarea></label>
        <button type="submit">Submit Self Review</button>
        <p id="status" class="status"></p>
      </form>
    </section>
  </main>
  <script type="module" src="./manager-self-review-app.js"></script>
</body>
</html>
