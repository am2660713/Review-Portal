<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager Review Form</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="hero card">
      <p class="tag">Manager Evaluation</p>
      <h1>Manager Review Form</h1>
      <p>Give star ratings and mandatory comments for each section.</p>
      <button id="backBtn" class="secondary">Back to Assignments</button>
      <button id="logoutBtn" class="secondary">Logout</button>
    </section>

    <section class="card review-form-card">
      <form id="managerForm">
        <label><span class="required-text">Assignment ID</span><input id="assignmentId" type="number" required readonly /></label>
        <h3>Manager Ratings (1-5)</h3>
        <div class="grid three">
          <div class="star-field"><label class="required-label">Quality</label><div class="star-rating" data-target="quality"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="quality" type="hidden" required /><textarea id="qualityNote" rows="2" placeholder="Quality note" required></textarea></div>
          <div class="star-field"><label class="required-label">Productivity</label><div class="star-rating" data-target="productivity"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="productivity" type="hidden" required /><textarea id="productivityNote" rows="2" placeholder="Productivity note" required></textarea></div>
          <div class="star-field"><label class="required-label">Job Knowledge</label><div class="star-rating" data-target="jobKnowledge"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="jobKnowledge" type="hidden" required /><textarea id="jobKnowledgeNote" rows="2" placeholder="Job knowledge note" required></textarea></div>
          <div class="star-field"><label class="required-label">Communication</label><div class="star-rating" data-target="communication"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="communication" type="hidden" required /><textarea id="communicationNote" rows="2" placeholder="Communication note" required></textarea></div>
          <div class="star-field"><label class="required-label">Teamwork</label><div class="star-rating" data-target="teamwork"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="teamwork" type="hidden" required /><textarea id="teamworkNote" rows="2" placeholder="Teamwork note" required></textarea></div>
          <div class="star-field"><label class="required-label">Initiative</label><div class="star-rating" data-target="initiative"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="initiative" type="hidden" required /><textarea id="initiativeNote" rows="2" placeholder="Initiative note" required></textarea></div>
          <div class="star-field"><label class="required-label">Reliability</label><div class="star-rating" data-target="reliability"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="reliability" type="hidden" required /><textarea id="reliabilityNote" rows="2" placeholder="Reliability note" required></textarea></div>
          <div class="star-field"><label class="required-label">Leadership</label><div class="star-rating" data-target="leadership"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="leadership" type="hidden" required /><textarea id="leadershipNote" rows="2" placeholder="Leadership note" required></textarea></div>
          <div class="star-field"><label class="required-label">Overall Rating</label><div class="star-rating" data-target="overallRating"><button type="button" class="star-btn" data-value="1">&#9733;</button><button type="button" class="star-btn" data-value="2">&#9733;</button><button type="button" class="star-btn" data-value="3">&#9733;</button><button type="button" class="star-btn" data-value="4">&#9733;</button><button type="button" class="star-btn" data-value="5">&#9733;</button></div><input id="overallRating" type="hidden" required /><textarea id="overallRatingNote" rows="2" placeholder="Overall note" required></textarea></div>
        </div>
        <h3>Manager Comments</h3>
        <label><span class="required-text">Strengths</span><textarea id="strengths" rows="3" required></textarea></label>
        <label><span class="required-text">Improvement Needed</span><textarea id="improvements" rows="3" required></textarea></label>
        <label><span class="required-text">Development Plan</span><textarea id="developmentPlan" rows="3" required></textarea></label>
        <label><span class="required-text">Final Comments</span><textarea id="comments" rows="4" required></textarea></label>
        <button type="submit">Submit Manager Review</button>
        <p id="status" class="status"></p>
      </form>
    </section>
  </main>
  <script type="module" src="./manager-review-app.js"></script>
</body>
</html>
