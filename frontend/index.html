<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance Review Login</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap auth-wrap">
    <section class="card auth-card">
      <p class="tag">Smart Review Portal</p>
      <h1>Welcome Back</h1>
      <p>Login to access your assigned review workflow.</p>
      <form id="loginForm" class="grid two">
        <label>Email<input id="email" type="email" required /></label>
        <label>Password<input id="password" type="password" required /></label>
        <button type="submit">Login</button>
      </form>
      <p id="status" class="status"></p>
      <div class="note-box">Demo users: Employee `akash@company.com`, Manager `chinmay@company.com`, Admin `admin@company.com`</div>
    </section>
  </main>
  <script type="module" src="./login.js"></script>
</body>
</html>
